<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIMO — Streamer & Creator</title>
<meta name="description" content="MIMO - All my links in one place">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#05030a;
    --purple:#8b5cf6;
    --purple-2:#a855f7;
    --purple-glow:rgba(139,92,246,.55);
    --card:rgba(15,12,25,.65);
    --card-hover:rgba(25,20,45,.85);
    --card-border:rgba(139,92,246,.20);
    --text:#ece9f5;
    --muted:#8a8499;
    --green:#22c55e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'JetBrains Mono',monospace;
    color:var(--text);
    background:var(--bg);
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }

  /* ===== خلفية الفارس البنفسجي (محاكاة فنية) ===== */
  .bg-layer{
    position:fixed;inset:0;z-index:-3;
    background:
      radial-gradient(ellipse 80% 60% at 70% 30%, #4c1d95 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 30% 70%, #6d28d9 0%, transparent 55%),
      radial-gradient(circle at 50% 50%, #2e1065 0%, #0f0823 50%, #05030a 100%);
  }
  /* أزهار الكرز/الجسيمات العائمة */
  .bg-particles{
    position:fixed;inset:0;z-index:-2;pointer-events:none;
    background-image:
      radial-gradient(2px 2px at 15% 20%, rgba(216,180,254,.6), transparent),
      radial-gradient(2px 2px at 85% 35%, rgba(196,181,253,.5), transparent),
      radial-gradient(1.5px 1.5px at 25% 75%, rgba(233,213,255,.55), transparent),
      radial-gradient(2px 2px at 70% 80%, rgba(192,132,252,.5), transparent),
      radial-gradient(1px 1px at 45% 15%, rgba(255,255,255,.4), transparent),
      radial-gradient(1.5px 1.5px at 90% 65%, rgba(216,180,254,.5), transparent),
      radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,.3), transparent),
      radial-gradient(2px 2px at 55% 95%, rgba(196,181,253,.5), transparent);
    background-size: 100% 100%;
    animation: floatParticles 20s linear infinite;
  }
  @keyframes floatParticles{
    0%{transform:translateY(0) rotate(0deg)}
    100%{transform:translateY(-30px) rotate(2deg)}
  }
  /* طبقة تعتيم لإبراز المحتوى */
  .bg-overlay{
    position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:
      linear-gradient(180deg,rgba(5,3,10,.55) 0%,rgba(5,3,10,.75) 50%,rgba(5,3,10,.95) 100%);
  }
  /* شبكة بنفسجية كما في التصميم الأصلي */
  .bg-grid{
    position:fixed;inset:0;z-index:-1;pointer-events:none;
    background-image:
      linear-gradient(rgba(139,92,246,.07) 1px,transparent 1px),
      linear-gradient(90deg,rgba(139,92,246,.07) 1px,transparent 1px);
    background-size:60px 60px;
    mask-image:radial-gradient(ellipse at center,#000 35%,transparent 90%);
    -webkit-mask-image:radial-gradient(ellipse at center,#000 35%,transparent 90%);
  }

  .wrap{
    max-width:560px;margin:0 auto;
    padding:64px 22px 40px;
    display:flex;flex-direction:column;align-items:center;
    position:relative;z-index:1;
  }

  /* ===== الأفاتار (الأرنب الأبيض - SVG مرسوم) ===== */
  .avatar{
    width:148px;height:148px;border-radius:50%;
    border:2px solid var(--purple);
    box-shadow:
      0 0 0 6px rgba(139,92,246,.10),
      0 0 60px 6px var(--purple-glow),
      inset 0 0 30px rgba(139,92,246,.20);
    background:#000;
    overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    animation:pulseGlow 3.2s ease-in-out infinite;
    position:relative;
  }
  .avatar svg{width:100%;height:100%;display:block}
  @keyframes pulseGlow{
    0%,100%{box-shadow:0 0 0 6px rgba(139,92,246,.10),0 0 50px 4px var(--purple-glow),inset 0 0 30px rgba(139,92,246,.20)}
    50%{box-shadow:0 0 0 6px rgba(139,92,246,.20),0 0 80px 12px var(--purple-glow),inset 0 0 30px rgba(139,92,246,.20)}
  }

  h1{
    margin-top:30px;
    font-size:42px;letter-spacing:8px;font-weight:800;
    text-shadow:0 0 30px rgba(139,92,246,.5);
  }
  .subtitle{
    margin-top:8px;color:var(--muted);
    letter-spacing:6px;font-size:13px;font-weight:500;
  }
  .divider{
    width:60px;height:2px;margin:26px 0 40px;
    background:linear-gradient(90deg,transparent,var(--purple),transparent);
    border-radius:2px;
  }

  /* ===== بطاقات الروابط ===== */
  .links{width:100%;display:flex;flex-direction:column;gap:16px}
  .link{
    display:flex;align-items:center;gap:18px;
    padding:16px 20px;
    background:var(--card);
    border:1px solid var(--card-border);
    border-radius:14px;
    text-decoration:none;color:var(--text);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    transition:transform .25s ease,border-color .25s ease,box-shadow .25s ease,background .25s ease;
    position:relative;overflow:hidden;
    animation:slideUp .6s ease backwards;
  }
  .link:nth-child(1){animation-delay:.1s}
  .link:nth-child(2){animation-delay:.2s}
  .link:nth-child(3){animation-delay:.3s}
  .link:nth-child(4){animation-delay:.4s}
  .link:nth-child(5){animation-delay:.5s}
  @keyframes slideUp{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
  }

  .link::before{
    content:"";position:absolute;inset:0;
    background:linear-gradient(120deg,transparent 30%,rgba(139,92,246,.15) 50%,transparent 70%);
    transform:translateX(-100%);transition:transform .6s ease;
  }
  .link:hover{
    transform:translateY(-3px);
    border-color:rgba(139,92,246,.6);
    box-shadow:0 12px 32px -8px rgba(139,92,246,.4);
    background:var(--card-hover);
  }
  .link:hover::before{transform:translateX(100%)}

  .icon{
    width:48px;height:48px;border-radius:11px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .icon svg{width:28px;height:28px}

  .twitch  {background:#2a1858}
  .kick    {background:#0a0a0a;border:1px solid #1f3d1f}
  .youtube {background:#1a0606}
  .discord {background:#1a1d3a}
  .insta   {background:radial-gradient(circle at 30% 110%,#fdc468 0%,#fc5185 35%,#a445b2 70%,#6b1e8e 100%)}

  .meta{flex:1;min-width:0}
  .meta .title{font-size:14px;font-weight:800;letter-spacing:3px}
  .meta .desc{
    margin-top:4px;color:var(--muted);font-size:14px;
    display:flex;align-items:center;gap:8px;
  }
  .live-dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--green);
    box-shadow:0 0 10px var(--green);
    animation:blink 1.4s ease-in-out infinite;
  }
  @keyframes blink{50%{opacity:.35}}

  .arrow{color:var(--muted);font-size:20px;transition:transform .25s,color .25s}
  .link:hover .arrow{transform:translateX(6px);color:var(--purple)}

  footer{
    margin-top:40px;color:#444050;
    letter-spacing:6px;font-size:11px;
  }

  @media (max-width:480px){
    h1{font-size:32px;letter-spacing:6px}
    .subtitle{font-size:11px;letter-spacing:4px}
    .avatar{width:120px;height:120px}
    .meta .title{font-size:12px}
    .meta .desc{font-size:13px}
    .wrap{padding:40px 18px 30px}
  }
</style>
</head>
